<div class="frame">
	<main>
		<!-- LEFT SIDE: Clipped Text Layer -->
		<div class="text-layer">
			<span class="eyebrow">Coming Summer 2026</span>

			<h1 class="headline">
				The Thing<br>
				You
				<span class="eyes-container">
					<div class="eye">
						<div class="pupil"></div>
					</div>
					<div class="eye">
						<div class="pupil"></div>
					</div>
				</span><br>
				<span class="yellow">Want</span>
			</h1>

			<div class="text-cols">
				<div class="col">
					<span class="arrow">↘</span>
					<p class="description">That thing you want to buy?<br>We have it. And it's almost here.</p>
				</div>
			</div>
		</div>

		<!-- The Precise Diagonal Clip Line -->
		<div class="diagonal-line"></div>

		<!-- RIGHT SIDE: Magnetic Interactions & Form -->

		<!-- Yellow Pill Area -->
		<div class="magnetic-area pill-area">
			<div class="magnetic-item part-pill">almost here →</div>
		</div>

		<!-- Purple Form Card Area (Semi hidden at bottom right) -->
		<div class="magnetic-area card-area">
			<div class="magnetic-item purple-card form-card">
				<p class="tag">#PreOrder</p>
				<h3>Sign up to get notified<br>when we launch.</h3>

				<form class="signup" onsubmit="event.preventDefault();">
					<input type="email" placeholder="Enter your email address" required>
					<button type="submit">Notify Me</button>
				</form>
			</div>
		</div>

	</main>
</div>
